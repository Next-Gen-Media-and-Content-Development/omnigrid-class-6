<style>
    /* 1. Grid ko Flexbox mein badal diya taaki cards bade na ho jayein */
    .grid-container {
        display: flex !important;
        flex-wrap: wrap !important;
        justify-content: center !important; /* Cards center mein rahenge */
        gap: 25px !important;
        padding: 40px 5% !important;
        max-width: 1200px !important;
        margin: 0 auto !important;
    }

    /* 2. Card ki fixed width set kar di */
    .card {
        background: #1e293b !important;
        border-radius: 15px !important;
        border: 2px solid #334155 !important;
        width: 280px !important; /* Cards ka size ab fix rahega */
        display: flex !important;
        flex-direction: column !important;
        overflow: hidden !important;
        transition: 0.3s !important;
    }

    .card-image {
        height: 160px !important;
        width: 100% !important;
        background-size: cover !important;
        background-position: center !important;
    }

    /* 3. Chatbot Window (Initially Hidden) */
    #chatbot-container {
        position: fixed !important;
        bottom: 100px !important;
        right: 20px !important;
        width: 300px !important;
        height: 400px !important;
        background: #1e293b !important;
        border: 2px solid #e94560 !important;
        border-radius: 15px !important;
        display: none; /* JS isse open karega */
        flex-direction: column !important;
        z-index: 10000 !important;
        box-shadow: 0 10px 25px rgba(0,0,0,0.5) !important;
    }

    .chatbot-header {
        background: #e94560 !important;
        color: white !important;
        padding: 10px !important;
        border-radius: 12px 12px 0 0 !important;
        display: flex !important;
        justify-content: space-between !important;
        align-items: center !important;
    }

    #chatbot-messages {
        flex-grow: 1 !important;
        padding: 15px !important;
        overflow-y: auto !important;
        font-size: 14px !important;
        display: flex !important;
        flex-direction: column !important;
        gap: 10px !important;
    }

    .message {
        padding: 8px 12px !important;
        border-radius: 10px !important;
        max-width: 85% !important;
    }

    .anya-msg { background: #334155 !important; align-self: flex-start !important; }
    .user-msg { background: #e94560 !important; align-self: flex-end !important; }

    .chatbot-input-area {
        display: flex !important;
        padding: 10px !important;
        gap: 5px !important;
        background: #0f172a !important;
    }

    #user-input {
        flex-grow: 1 !important;
        padding: 8px !important;
        border-radius: 5px !important;
        border: none !important;
        outline: none !important;
    }
</style>

<div id="chatbot-container">
    <div class="chatbot-header">
        <span>Anya AI Companion</span>
        <button onclick="toggleChat()" style="background:none; border:none; color:white; cursor:pointer; font-size:20px;">×</button>
    </div>
    <div id="chatbot-messages">
        <div class="message anya-msg">Konnichiwa! Main Anya hoon. Main aapki kaise madad kar sakti hoon?</div>
    </div>
    <div class="chatbot-input-area">
        <input type="text" id="user-input" placeholder="Type a message...">
        <button onclick="sendMessage()" style="background:#e94560; color:white; border:none; padding:8px 15px; border-radius:5px; cursor:pointer;">Send</button>
    </div>
</div>

<button id="open-chat-btn" onclick="toggleChat()">
    <img src="companion-avatar.png">
</button>

<script>
    function toggleChat() {
        const chat = document.getElementById('chatbot-container');
        if (chat.style.display === 'none' || chat.style.display === '') {
            chat.style.display = 'flex';
        } else {
            chat.style.display = 'none';
        }
    }

    function sendMessage() {
        const input = document.getElementById('user-input');
        const msgContainer = document.getElementById('chatbot-messages');
        
        if (input.value.trim() === "") return;

        // User message
        const userDiv = document.createElement('div');
        userDiv.className = 'message user-msg';
        userDiv.innerText = input.value;
        msgContainer.appendChild(userDiv);

        const userText = input.value.toLowerCase();
        input.value = "";

        // Anya reply
        setTimeout(() => {
            const anyaDiv = document.createElement('div');
            anyaDiv.className = 'message anya-msg';
            
            if (userText.includes("hi") || userText.includes("hello")) {
                anyaDiv.innerText = "Hello Adventurer! Aaj kaunsa subject padhna hai? Science ya Maths?";
            } else if (userText.includes("science")) {
                anyaDiv.innerText = "Science mera favorite hai! 'Universe Explorer' card par click karein.";
            } else {
                anyaDiv.innerText = "Mujhe samajh nahi aaya, par main seekh rahi hoon! ✨";
            }
            
            msgContainer.appendChild(anyaDiv);
            msgContainer.scrollTop = msgContainer.scrollHeight;
        }, 600);
    }
</script>
